<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Not Found</title>
  <link rel="icon" href="icon-light.png" type="image/png" />
  <style>
    :root {
      --color-primary: #00793d;
      --color-secondary: #4a6354;
      --color-background: #ffffff;
      --color-on-background: #1a1c19;
      --shape-corner-medium: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Serif JP', serif;
      background: var(--color-background);
      color: var(--color-on-background);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }

    .container {
      width: min(560px, 100%);
      border: 2px solid var(--color-primary);
      border-radius: var(--shape-corner-medium);
      box-shadow: 0 0 16px color-mix(in srgb, var(--color-primary) 45%, transparent);
      overflow: hidden;
      background: var(--color-background);
    }

    .title-bar {
      background: var(--color-primary);
      color: #ffffff;
      padding: 1rem;
      text-align: center;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      letter-spacing: 0.05em;
      font-weight: 700;
    }

    .content {
      padding: 2rem 1.5rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 5rem);
      color: var(--color-primary);
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .subtext {
      color: var(--color-secondary);
      margin-bottom: 1.5rem;
    }

    a.back {
      display: inline-block;
      padding: 0.65rem 1.2rem;
      background: var(--color-primary);
      color: #fff;
      text-decoration: none;
      border-radius: var(--shape-corner-medium);
      font-weight: 600;
      transition: filter 0.2s ease;
    }

    a.back:hover {
      filter: brightness(1.08);
    }

    footer {
      text-align: center;
      color: var(--color-secondary);
      font-size: 0.85rem;
      padding: 1rem 1.25rem 1.25rem;
      border-top: 1px solid color-mix(in srgb, var(--color-primary) 20%, #ffffff);
    }

    footer a {
      color: var(--color-primary);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="title-bar">文字拡大アプリ</div>
    <section class="content">
      <h1>404</h1>
      <p>ページが見つかりません</p>
      <p class="subtext">Sorry, Not Found.</p>
      <a id="backLink" class="back" href="/">トップページへ戻る</a>
    </section>
    <footer id="footer-copy"></footer>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (location.hostname === 'hamuzon.github.io') {
        document.getElementById('backLink').href = 'https://hamuzon.github.io/text/';
      }
    });

    (function () {
      const baseYear = 2025;
      const currentYear = new Date().getFullYear();
      const footer = document.getElementById('footer-copy');
      const yearStr = currentYear === baseYear ? `${baseYear}` : `${Math.min(baseYear, currentYear)}–${Math.max(baseYear, currentYear)}`;
      footer.innerHTML = `&copy; ${yearStr} <a href="https://hamuzon.github.io" target="_blank" rel="noopener noreferrer">@hamuzon</a>`;
    })();
  </script>
</body>
</html>
