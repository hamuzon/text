<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文字拡大アプリ - Text Enlargement App</title>
<meta name="description" content="入力した文字を大きく表示できる、文字拡大アプリです。フォントサイズ、太さ、行間、フォント種類を自由に変更できます。">
<meta name="keywords" content="文字拡大,テキスト拡大,文字表示,大きい文字,フォント変更,文字ツール">
<meta name="author" content="Text Enlargement App">

<!-- OGP -->
<meta property="og:type" content="website">
<meta property="og:title" content="文字拡大アプリ - 大きな文字で表示">
<meta property="og:description" content="入力した文字を自由なサイズ・フォントで大きく表示できる無料ツールです。">
<meta property="og:site_name" content="Text Enlargement App">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="文字拡大アプリ - 大きな文字で表示">
<meta name="twitter:description" content="文字サイズやフォントを変更して見やすく表示できます。">

<meta name="application-name" content="文字拡大アプリ">
<meta name="theme-color" content="#00793d">

<link rel="icon" href="icon-light.png" type="image/png">
<link rel="apple-touch-icon" href="icon-light.png">

<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&family=BIZ+UDPMincho&family=Zen+Kaku+Gothic+New&family=Zen+Maru+Gothic&family=Noto+Sans+JP&family=Noto+Serif+JP&family=Sawarabi+Gothic&family=Sawarabi+Mincho&family=Potta+One&family=Kosugi&family=Kosugi+Maru&family=Kiwi+Maru&family=M+PLUS+1p&family=M+PLUS+Rounded+1c&family=Shippori+Mincho&family=Shippori+Antique&family=Hina+Mincho&family=Yusei+Magic&family=Rampart+One&family=DotGothic16&family=Yuji+Syuku&family=Yuji+Mai&family=Yuji+Boku&family=Stick&family=Train+One&family=RocknRoll+One&family=Reggae+One&family=Dela+Gothic+One&family=New+Tegomin&family=Kaisei+Opti&family=Kaisei+Decol&family=Kaisei+HarunoUmi&family=Kaisei+Tokumin&family=IBM+Plex+Sans+JP&family=IBM+Plex+Serif+JP&family=Source+Han+Sans+JP&family=Source+Han+Serif+JP&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>
<header id="appTitle">文字拡大アプリ</header>

<main>
<section aria-label="入力エリア">
<textarea id="textInput" placeholder="ここにテキストを入力してください"></textarea>
<div class="button-row" aria-label="操作">
  <button class="copy-button" type="button" data-action="copy">Copy URL</button>
  <button class="clear-button" type="button" data-action="clear">Clear Text</button>
  <button class="reset-button" type="button" data-action="reset">Reset</button>
</div>
</section>

<section aria-label="出力エリア">
<div id="displayArea">test</div>
<div class="button-row" aria-label="操作">
  <button class="copy-button" type="button" data-action="copy">Copy URL</button>
  <button class="clear-button" type="button" data-action="clear">Clear Text</button>
  <button class="reset-button" type="button" data-action="reset">Reset</button>
</div>
</section>

<section>
<h2>設定</h2>
<div id="settings">
  <div class="setting-item">
    <label for="fontSizeSlider">フォントサイズ (px)</label>
    <input type="range" id="fontSizeSlider" min="40" max="1200" step="1" value="120">
    <output id="fontSizeValue">120</output>
  </div>
  <div class="setting-item">
    <label for="fontWeightSlider">フォント太さ</label>
    <input type="range" id="fontWeightSlider" min="400" max="900" step="100" value="600">
    <output id="fontWeightValue">600</output>
  </div>
  <div class="setting-item">
    <label for="lineHeightSlider">行間</label>
    <input type="range" id="lineHeightSlider" min="1" max="2" step="0.05" value="1.4">
    <output id="lineHeightValue">1.4</output>
  </div>
  <div class="setting-item">
    <label for="fontSelector">フォント選択</label>
    <select id="fontSelector">
      <option value="'BIZ UDPGothic', sans-serif">BIZ UDPGothic</option>
      <option value="'BIZ UDPMincho', serif">BIZ UDPMincho</option>
      <option value="'Zen Kaku Gothic New', sans-serif">Zen Kaku Gothic New</option>
      <option value="'Zen Maru Gothic', sans-serif">Zen Maru Gothic</option>
      <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
      <option value="'Noto Serif JP', serif" selected>Noto Serif JP</option>
      <option value="'Sawarabi Gothic', sans-serif">Sawarabi Gothic</option>
      <option value="'Sawarabi Mincho', serif">Sawarabi Mincho</option>
      <option value="'Potta One', cursive">Potta One</option>
      <option value="'Kosugi', sans-serif">Kosugi</option>
      <option value="'Kosugi Maru', sans-serif">Kosugi Maru</option>
      <option value="'Kiwi Maru', serif">Kiwi Maru</option>
      <option value="'M PLUS 1p', sans-serif">M PLUS 1p</option>
      <option value="'M PLUS Rounded 1c', sans-serif">M PLUS Rounded 1c</option>
      <option value="'Shippori Mincho', serif">Shippori Mincho</option>
      <option value="'Shippori Antique', serif">Shippori Antique</option>
      <option value="'Hina Mincho', serif">Hina Mincho</option>
      <option value="'Yusei Magic', sans-serif">Yusei Magic</option>
      <option value="'Rampart One', cursive">Rampart One</option>
      <option value="'DotGothic16', sans-serif">DotGothic16</option>
      <option value="'Yuji Syuku', serif">Yuji Syuku</option>
      <option value="'Yuji Mai', serif">Yuji Mai</option>
      <option value="'Yuji Boku', serif">Yuji Boku</option>
      <option value="'Stick', sans-serif">Stick</option>
      <option value="'Train One', cursive">Train One</option>
      <option value="'RocknRoll One', cursive">RocknRoll One</option>
      <option value="'Reggae One', cursive">Reggae One</option>
      <option value="'Dela Gothic One', sans-serif">Dela Gothic One</option>
      <option value="'New Tegomin', serif">New Tegomin</option>
      <option value="'Kaisei Opti', serif">Kaisei Opti</option>
      <option value="'Kaisei Decol', serif">Kaisei Decol</option>
      <option value="'Kaisei HarunoUmi', serif">Kaisei HarunoUmi</option>
      <option value="'Kaisei Tokumin', serif">Kaisei Tokumin</option>
      <option value="'IBM Plex Sans JP', sans-serif">IBM Plex Sans JP</option>
      <option value="'IBM Plex Serif JP', serif">IBM Plex Serif JP</option>
      <option value="'Source Han Sans JP', sans-serif">Source Han Sans JP</option>
      <option value="'Source Han Serif JP', serif">Source Han Serif JP</option>
      <option value="Arial, sans-serif">Arial</option>
      <option value="Verdana, sans-serif">Verdana</option>
      <option value="Times New Roman, serif">Times New Roman</option>
      <option value="Courier New, monospace">Courier New</option>
      <option value="Georgia, serif">Georgia</option>
      <option value="Tahoma, sans-serif">Tahoma</option>
    </select>
  </div>
  <div class="setting-item">
    <label for="accentSelector">アクセントカラー</label>
    <input type="color" id="accentSelector" value="#00793d">
  </div>
</div>
</section>
</main>

<footer id="footer">
<div id="footer-author">&copy;2025 Text Enlargement App</div>

</div>
</footer>

<script src="script.js" defer></script>
</body>
</html>
